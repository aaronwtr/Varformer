# Default hyperparameters for Varformer.
# Population, seed, and use_pvc are runtime args, NOT config keys.
hyperparameters:
  # training & optimization
  optimizer: AdamW
  pusb: True
  precision: "16-mixed"     # fp16-mixed.  bf16-mixed was tried (Run 8) but
                            # its 8-bit mantissa prevented the model from
                            # learning at all (val_spearman collapsed to ~0.1
                            # and classifications went all-zero).  Under fp16
                            # the model converges to paper-range metrics
                            # (test_pfam ~0.58 at peak epoch 11) but is
                            # numerically delicate — see the gradient clip,
                            # eps, and EmbeddingNormClipCallback below.

  epochs: 100
  gradient_clip_val: 1.0   # standard transformer stabilizer; without it the
                           # mutation_embedding norm grows unboundedly and the
                           # cross-attention layers overflow under fp16 AMP.
  batch_size: 128
  grad_accum: null
  lr_start: 1e-4
  lr_end: 1e-5
  scheduler: "CosineAnnealingLR"
  T0: 200
  weight_decay: 3e-4
  mutation_embedding_max_norm: 20.0   # per-vector L2 cap on the mutation
                                      # embedding, applied after each optimizer
                                      # step via EmbeddingNormClipCallback.
                                      # Well above the init norm (~sqrt(d_model/2)
                                      # ≈ 11) so it does not alter early training,
                                      # but prevents the runaway that overflows
                                      # the cross-attention layer.  Implemented as
                                      # a callback (not nn.Embedding max_norm) to
                                      # avoid the bf16 autocast dtype conflict
                                      # that crashes fused AdamW.
  use_pvc: True

  # architecture
  gc_width: 32
  go_width: 512
  max_seq_len: 1024
  num_encoder_layers: 3
  d_model: 256
  dim_feedforward: 4096
  gv_attn_dim: 256
  nhead: 8
  depth_cls_head: 4
  dropout: 0.3
  threshold: 0.5

  # logistic regression baseline
  C: 1
  penalty: "l2"
  solver: "liblinear"
  max_iter: 1000
  class_weight: "balanced"

  # misc
  wandb: True
  return_attn: True
  num_workers: 0
  seed: 57
  mode: "inference"
